name: Fiddling

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

jobs:
  build-test-package:
    name: Compile (no tests) with JDK 17
    runs-on: ubuntu-latest
    steps:
      - uses: n1hility/cancel-previous-runs@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            m2-
      - name: Generate settings.xml for Maven Builds
        uses: whelk-io/maven-settings-xml-action@v21
        with:
          repositories: '[{ "id": "jboss", "name": "JBoss", "url": "https://repository.jboss.org/nexus/content/groups/public" }]'
      - name: Print Version
        run: mvn -v
      - uses: actions/checkout@v6
        with:
          path: undertow
      - uses: actions/checkout@v6
        with:
          path: wildfly
          repository: wildfly/wildfly
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Build Undertow
        run: |
          #cd undertow
          #mvn -DskipTests clean install
      - name: Get Undertow Version
        id: undertow-version
        run: |
          cd undertow
          version="`mvn org.apache.maven.plugins:maven-help-plugin:2.1.1:evaluate -Dexpression=project.version | sed -n -e '/^\[.*\]/ !{ /^[0-9]/ { p; q } }'`"
          echo "V $version"
          echo "UNDERTOW_VERSION=$version" >> $GITHUB_ENV      
          # https://github.com/marketplace/actions/get-current-pom-version-of-project ?
      - name: Build WFLY
        run: |
          #cd wildfly
          #mvn -DskipTests -Dversion.io.undertow=${{steps.undertow-version.UNDERTOW_VERSION}} clean install
      - name: Tar Maven Repo
        shell: bash
        run: tar -czf maven-repo.tgz -C ~ .m2/repository
      - name: Persist Maven Repo
        uses: actions/upload-artifact@v4
        with:
          name: maven-repo
          path: maven-repo.tgz
      - name: Display structure of downloaded files
        run: |
          ls -a
          echo "XXX ${{steps.undertow-version.UNDERTOW_VERSION}}"
          echo "XXX $UNDERTOW_VERSION"
